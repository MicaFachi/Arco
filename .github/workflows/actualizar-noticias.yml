name: Actualizar noticias

on:
  schedule:
    # 08:40 UTC = 05:40 Argentina (UTC-3). Temprano y en minuto "raro"
    # para esquivar la congestion de GitHub Actions y llegar antes de las 8am.
    - cron: '40 8 * * *'
  workflow_dispatch:  # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install feedparser

      - name: Ejecutar script de procesamiento
        run: python script/procesar_rss.py

      - name: Commitear y subir cambios
        run: |
          git config user.name "Arco Bot"
          git config user.email "actions@github.com"
          git add data/noticias.json
          if git diff --staged --quiet; then
            echo "Sin cambios en las noticias."
          else
            git commit -m "Actualizacion automatica de noticias"
            git push
          fi
